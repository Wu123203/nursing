server:
  ip: localhost
  port: 8080
  servlet:
    encoding:
      enabled: true
      charset: UTF-8
      force-response: true
      force-request: true
spring:
  datasource:
    name: mysql_test
    type: com.alibaba.druid.pool.DruidDataSource
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: root
    password: 112233
    url: jdbc:mysql://localhost:3306/db_elderly_care?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    #配置初始化大小/最小/最大
    max-active: 20
    #获取连接等待超时时间
    max-wait: 60000
    #间隔多久进行一次检测，检测需要关闭的空闲连接
    time-between-eviction-runs-millis: 60000
    #一个连接在池中最小生存的时间
    min-evictable-idle-time-millis: 300000
    #druid相关配置
    validation-query: SELECT 'x'
    #监控统计拦截的filters
    test-while-idle: true
    test-on-borrow: false
    test-on-return: false
    #打开PSCache，并指定每个连接上PSCache的大小
    pool-prepared-statements: false
    max-pool-prepared-statement-per-connection-size: 20
  http:
    encoding:
      charset: UTF-8
      enabled: true
      force: true
  #静态资源配置
  web:
    resources:
      static-locations: classpath:static/
  servlet:
    multipart:
      #单个文件
      max-file-size: 5MB
      max-request-size: 10MB
  # Redis 配置
  data:
    redis:
      host: 192.168.25.128
      port: 6379
      password: 112233
      timeout: 6000ms
      lettuce:
        pool:
          max-wait: -1ms
          max-idle: 8
          min-idle: 0
  devtools:
    restart:
      enabled: false
#mybatis配置
mybatis:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.elderly.entity
  configuration:
    #数据库字段和实体类字段驼峰映射
    map-underscore-to-camel-case: true
    #打印sql日志
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
#pagehelper
pagehelper:
  reasonable: true
  supportMethodsArguments: true
  params: count=countSql
  returnPageInfo: check

page:
  size: 20